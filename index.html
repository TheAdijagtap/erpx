      <h1>OPIS – Affordable ERP for Indian MSMEs</h1>
      <p>OPIS by Necrus Technologies is India's most affordable ERP system for MSMEs. Manage inventory, purchase orders, GST-compliant invoicing, HR, attendance, and payroll — all in one cloud-based platform.</p>
      <h2>Key Features</h2>
      <ul>
        <li>Inventory Management – Real-time stock tracking, low-stock alerts, multi-location support</li>
        <li>Purchase Orders – Automated GST calculations, supplier linking, approval workflows</li>
        <li>Goods Receipt &amp; QC – Quality checks, batch numbers, auto stock updates</li>
        <li>Proforma Invoices – GST-compliant invoicing with PDF exports</li>
        <li>Employee Management – Complete HR directory with salary structures</li>
        <li>Attendance &amp; Leave – Daily tracking, leave approvals, QR-based leave requests</li>
        <li>Payroll &amp; Payslips – Auto salary calculation with PF/ESI/PT rules</li>
      </ul>
      <h2>Pricing</h2>
      <p>Free trial available. Monthly plan: ₹499/month. Yearly plan: ₹4,999/year (save 17%).</p>
